<div class="container mt-4 mb-5">
    @if (mensajeError()) {
    <div class="alert alert-danger shadow-lg border-0 d-flex align-items-center fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
        <div>
            {{ mensajeError() }}
        </div>
    </div>
    }

    <h3 class="mb-4 text-success"><i class="bi bi-pencil-square me-2"></i> Actualizar Destino</h3>

    @if (destinoOriginal()) {
    <app-destino-form-component [destinoEditar]="destinoOriginal()" (destino)="actualizarDestino($event)">
    </app-destino-form-component>
    } @else {
    <div class="text-center mt-5 py-5 text-muted">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-3 fw-bold">Cargando datos del destino...</p>
    </div>
    }
</div>
