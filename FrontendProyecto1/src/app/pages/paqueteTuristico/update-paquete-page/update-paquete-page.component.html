<div class="container mt-4 mb-5 text-light">
        <h3 class="mb-4 fw-bold text-info"><i class="bi bi-pencil-square me-2"></i> Actualizar Paquete</h3>
        
        @if (paqueteOriginal() && listaDestinos().length > 0) {
            <app-paquete-form-component 
                [paqueteEditar]="paqueteOriginal()"
                [listaDestinos]="listaDestinos()"
                (paquete)="actualizarPaquete($event)">
            </app-paquete-form-component>
        } @else {
            <div class="text-center mt-5 py-5 text-light">
                <div class="spinner-border text-info" role="status"></div>
                <p class="mt-3 fw-bold">Preparando entorno de edición...</p>
            </div>
        }
    </div>
