<div class="container mt-4 text-light">
    <div class="row mb-4 align-items-center">
        <div class="col-md-8">
            <h2 class="mb-0 fw-bold text-info"><i class="bi bi-box-seam me-2"></i> Gestión de Paquetes</h2>
            <p class="text-light opacity-75 mt-1">Crea y administra los viajes completos que ofrece la agencia.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <button class="btn btn-info shadow-sm px-4 fw-bold text-dark" routerLink="/paquete/crear">
                <i class="bi bi-plus-circle-fill me-2"></i> Nuevo Paquete
            </button>
        </div>
    </div>
    <div class="card bg-dark border-secondary shadow-sm mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-center">

                <div class="col-12 col-md-auto text-light opacity-75 fw-bold mb-2 mb-md-0 me-3">
                    <i class="bi bi-funnel-fill me-1"></i> Filtrar por:
                </div>

                <div class="col-12 col-md-4">
                    <select class="form-select bg-light text-dark border-0 shadow-sm" [(ngModel)]="filtroDestino">
                        <option value="">Todos los Destinos</option>
                        @for (destino of listaDestinos(); track destino.destinoId) {
                        <option [value]="destino.destinoId">{{ destino.nombre }}</option>
                        }
                    </select>
                </div>

                <div class="col-12 col-md-5">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-0 bg-light"
                            placeholder="Nombre del paquete..." [(ngModel)]="concidencia">
                    </div>
                </div>

                <div class="col-12 col-md-auto ms-auto text-end">
                    @if (filtroDestino()) {
                    <button class="btn btn-outline-danger btn-sm" (click)="limpiarFiltros()">
                        <i class="bi bi-x-circle me-1"></i> Limpiar
                    </button>
                    }
                </div>

            </div>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
        @for (paquete of paquetesFiltrados(); track paquete.paqueteId) {
        <div class="col">
            <app-paquete-card-component [paquete]="paquete" (onDelete)="seleccionarPaquete($event)"
                (onToggleEstado)="cambiarEstado($event)" (onVerServicios)="gestionarServicios($event)">
            </app-paquete-card-component>
        </div>
        } @empty {
        <div class="col-12 text-center py-5 rounded-3 border border-secondary"
            style="background-color: rgba(255,255,255,0.05);">
            <i class="bi bi-search fs-1 d-block mb-2 text-secondary"></i>
            <h5 class="fw-bold">No se encontraron paquetes</h5>
            <p class="opacity-75">Intenta cambiar los filtros de búsqueda.</p>
        </div>
        }
    </div>
</div>
<confirmation-modal-paquete-component [paquete]="paqueteSeleccionado()"
    (onConfirm)="eliminarPaquete()"></confirmation-modal-paquete-component>
