<form [formGroup]="clienteForm" (ngSubmit)="guardar()" class="p-4 bg-white bg-opacity-50 rounded shadow-sm border-top border-primary border-3">

    <div class="row g-4">
        <div class="col-md-6">
            <label for="dpi_o_pasaporte" class="form-label fw-bold text-dark">DPI o Pasaporte</label>
            <input type="text" id="dpi_o_pasaporte" class="form-control" formControlName="dpi_o_pasaporte" placeholder="Ej. 1234567890101"
                [ngClass]="{'is-invalid': clienteForm.get('dpi_o_pasaporte')?.invalid && clienteForm.get('dpi_o_pasaporte')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">Documento de identidad requerido.</div>
        </div>

        <div class="col-md-6">
            <label for="nombre" class="form-label fw-bold text-dark">Nombre Completo</label>
            <input type="text" id="nombre" class="form-control" formControlName="nombre" placeholder="Nombre del viajero"
                [ngClass]="{'is-invalid': clienteForm.get('nombre')?.invalid && clienteForm.get('nombre')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">El nombre es obligatorio.</div>
        </div>

        <div class="col-md-4">
            <label for="fecha" class="form-label fw-bold text-dark">Fecha de Nacimiento</label>
            <input type="date" id="fecha" class="form-control" formControlName="fecha"
                [ngClass]="{'is-invalid': clienteForm.get('fecha')?.invalid && clienteForm.get('fecha')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">Seleccione una fecha válida.</div>
        </div>

        <div class="col-md-4">
            <label for="nacionalidad" class="form-label fw-bold text-dark">Nacionalidad</label>
            <input type="text" id="nacionalidad" class="form-control" formControlName="nacionalidad" placeholder="Ej. Guatemalteca"
                [ngClass]="{'is-invalid': clienteForm.get('nacionalidad')?.invalid && clienteForm.get('nacionalidad')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">La nacionalidad es obligatoria.</div>
        </div>

        <div class="col-md-4">
            <label for="telefono" class="form-label fw-bold text-dark">Teléfono</label>
            <input type="text" id="telefono" class="form-control" formControlName="telefono" placeholder="Ej. +502 12345678"
                [ngClass]="{'is-invalid': clienteForm.get('telefono')?.invalid && clienteForm.get('telefono')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">El teléfono es obligatorio.</div>
        </div>

        <div class="col-md-12">
            <label for="email" class="form-label fw-bold text-dark">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com"
                [ngClass]="{'is-invalid': clienteForm.get('email')?.invalid && clienteForm.get('email')?.touched}">
            <div class="invalid-feedback text-dark fw-bold">Ingrese un correo electrónico válido.</div>
        </div>

        <div class="col-12 text-end mt-4">
            <button type="button" class="btn btn-dark px-4 me-2" routerLink="/cliente">Cancelar</button>
            <button type="submit" class="btn btn-primary px-4 fw-bold text-light">
                <i class="bi" [ngClass]="clienteEditar ? 'bi-pencil-square' : 'bi-person-plus-fill'"></i>
                {{ clienteEditar ? 'Actualizar Cliente' : 'Registrar Cliente' }}
            </button>
        </div>
    </div>
</form>
