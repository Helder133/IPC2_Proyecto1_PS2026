<div class="card h-100 bg-dark text-light border-primary shadow-sm">
    <div class="card-body p-4 d-flex flex-column">

        <div class="d-flex justify-content-between align-items-start mb-3">
            <div class="d-flex align-items-center">
                <div class="bg-primary bg-opacity-25 text-primary rounded-circle d-flex align-items-center justify-content-center me-3"
                    style="width: 50px; height: 50px;">
                    <i class="bi bi-person-fill fs-3"></i>
                </div>
                <div>
                    <h5 class="card-title fw-bold text-white mb-0 text-truncate" style="max-width: 200px;">{{
                        cliente.nombre }}</h5>
                    <span class="text-muted badge bg-secondary">#{{ cliente.cliente_id }}</span>
                </div>
            </div>
        </div>

        <div class="mb-2">
            <i class="bi bi-person-vcard text-info me-2"></i>
            <span class="text-light opacity-75 small">Doc:</span> <span class="fw-semibold">{{ cliente.dpi_o_pasaporte
                }}</span>
        </div>
        <div class="mb-2 text-truncate">
            <i class="bi bi-envelope-at text-info me-2"></i>
            <span class="text-light opacity-75 small">{{ cliente.email }}</span>
        </div>
        <div class="mb-3">
            <i class="bi bi-telephone text-info me-2"></i>
            <span class="text-light opacity-75 small">{{ cliente.telefono }}</span>
        </div>

        <div class="mt-auto border-top border-secondary pt-3 d-flex justify-content-between gap-2">
            <a routerLink='/cliente/actualizar/{{ cliente.cliente_id }}'
                class="btn btn-outline-primary btn-sm flex-grow-1">
                <i class="bi bi-pencil-square me-1"></i> Editar
            </a>
            <button class="btn btn-outline-info btn-sm w-100 fw-bold mt-2"
                routerLink='/reservacion/historial/cliente/{{cliente.cliente_id}}'>
                <i class="bi bi-clock-history me-1"></i> Ver Historial de Viajes
            </button>
            <!--
            <button class="btn btn-outline-danger btn-sm flex-grow-1" (click)="onDelete.emit(cliente)">
                <i class="bi bi-trash-fill me-1"></i> Eliminar
            </button>
            -->
        </div>

    </div>
</div>
