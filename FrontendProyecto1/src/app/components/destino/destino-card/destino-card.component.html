<div class="card h-100 bg-dark text-light border-secondary shadow-sm hover-shadow transition-all">
    <div class="position-relative">
        <img [src]="destino.imagen" class="card-img-top" [alt]="destino.nombre"
            style="height: 220px; object-fit: cover;"
            onerror="this.src='https://placehold.co/600x400/333333/dddddd?text=Sin+Imagen'">
        <span
            class="position-absolute top-0 end-0 badge bg-warning text-dark m-3 px-3 py-2 rounded-pill fw-bold shadow">
            <i class="bi bi-geo-alt-fill me-1"></i> {{ destino.pais }}
        </span>
    </div>
    <div class="card-body d-flex flex-column p-4">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title fw-bold text-info mb-0">{{ destino.nombre }}</h5>
            <span class="text-light opacity-50 small">#{{ destino.destinoId }}</span>
        </div>
        <p class="text-warning fw-semibold small mb-3">
            <i class="bi bi-cloud-sun me-1"></i> {{ destino.clima_mejor_epoca }}
        </p>
        <p class="card-text flex-grow-1 text-light opacity-75" style="font-size: 0.95rem;">
            {{ destino.descripcion }}
        </p>
        <div class="border-top border-secondary pt-3 mt-3 d-flex justify-content-between gap-2">
            <a [routerLink]="['/operaciones/destinos/editar', destino.destinoId]"
                class="btn btn-outline-info btn-sm flex-grow-1 fw-bold">
                <i class="bi bi-pencil-square me-1"></i> Editar
            </a>
            <button class="btn btn-outline-danger btn-sm px-2 flex-grow-1 fw-bold" (click)="onDelete.emit(destino)">
                <i class="bi bi-trash-fill me-1"></i> Eliminar
            </button>
        </div>
    </div>
</div>
