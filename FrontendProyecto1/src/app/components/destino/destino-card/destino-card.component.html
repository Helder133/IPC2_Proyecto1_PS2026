<div class="card h-100 shadow-sm border-0 hover-shadow transition-all">
    <div class="position-relative">
        <img [src]="destino.imagen" class="card-img-top" [alt]="destino.nombre"
            style="height: 220px; object-fit: cover;"
            onerror="this.src='https://placehold.co/600x400/eeeeee/999999?text=Sin+Imagen'">
        <span
            class="position-absolute top-0 end-0 badge bg-warning text-dark m-3 px-3 py-2 rounded-pill fw-bold shadow">
            <i class="bi bi-geo-alt-fill me-1"></i> {{ destino.pais }}
        </span>
    </div>
    <div class="card-body d-flex flex-column p-4">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title fw-bold text-primary mb-0">{{ destino.nombre }}</h5>
            <span class="text-muted small">#{{ destino.destinoId }}</span>
        </div>
        <p class="text-info fw-semibold small mb-3">
            <i class="bi bi-cloud-sun me-1"></i> {{ destino.clima_mejor_epoca }}
        </p>
        <p class="card-text flex-grow-1 text-secondary" style="font-size: 0.95rem;">
            {{ destino.descripcion }}
        </p>
        <div class="border-top pt-3 mt-3 d-flex justify-content-between gap-2">
            <a routerLink="/destino/actualizar/{{ destino.destinoId }}" class="btn btn-outline-primary btn-sm flex-grow-1 fw-bold">
                <i class="bi bi-pencil-square me-1"></i> Editar
            </a>
            <button class="btn btn-outline-danger btn-sm px-2" data-bs-toggle="modal" data-bs-target="#deleteModal"
                (click)="onDelete.emit(destino)">
                <i class="bi bi-trash-fill me-1"></i> Eliminar
            </button>
        </div>
    </div>
</div>
