<div class="card bg-dark text-light border-secondary shadow-sm mb-3">
    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center p-3">

        <div class="mb-3 mb-md-0">
            <div class="d-flex align-items-center mb-1">
                <span class="badge bg-secondary text-white border border-light me-2">
                    {{ servicio.proveedorResponse.tipo }}
                </span>
                <h6 class="card-title fw-bold text-warning mb-0">{{ servicio.proveedorResponse.nombre }}</h6>
            </div>
            <p class="card-text text-light opacity-75 mb-0 ps-1">
                <i class="bi bi-chevron-right text-primary me-1 small"></i>
                {{ servicio.descripcion }}
            </p>
        </div>

        <div class="d-flex flex-row align-items-center gap-3">
            <div class="text-end me-2">
                <span class="d-block small text-light">Costo Interno</span>
                <span class="fw-bold text-success fs-5">Q{{ servicio.costo }}</span>
            </div>

            <div class="vr bg-secondary d-none d-md-block"></div>
            <div class="d-flex flex-column flex-sm-row gap-2">
                <button class="btn btn-outline-info btn-sm" (click)="onEdit.emit(servicio)">
                    <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal"
                    (click)="onDelete.emit(servicio)">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </div>
        </div>

    </div>
</div>
